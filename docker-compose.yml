## =========================
## docker-compose.yml
## =========================
##
## Этот compose поднимает два сервиса:
## - `server` (backend Node.js)
## - `client` (Next.js в режиме standalone)
##
## ВАЖНО ПРО ВАШУ ЦЕЛЬ:
## - Локальный Postgres контейнер тут НЕ используется.
## - База данных берётся из Supabase по строке подключения, которая прокидывается в `server`
##   через переменные окружения.
##
## Обязательность файла: если вы запускаете проект через Docker Compose — ОБЯЗАТЕЛЬНО.
## Если запускаете всё вручную (node/npm локально) — ОПЦИОНАЛЬНО.

services:
  server:
    ## build — собираем образ из Dockerfile (а не используем готовый image).
    ## - Обязательность: да, если вы не публикуете image в registry.
    ## - Альтернатива: `image: your-registry/your-server:tag`.
    build:
      ## context — папка, которая будет контекстом сборки (что доступно для COPY).
      ## - Обязательность: да при использовании build.
      context: ./server
      ## dockerfile — имя Dockerfile внутри context.
      ## - Обязательность: ОПЦИОНАЛЬНО, если файл называется `Dockerfile`.
      dockerfile: Dockerfile
    ## container_name — фиксирует имя контейнера.
    ## - Обязательность: ОПЦИОНАЛЬНО.
    ## - Минусы: усложняет запуск нескольких копий compose (например, параллельные окружения).
    container_name: project-server
    environment:
      ## environment — переменные окружения внутри контейнера.
      ## - Обязательность: зависит от приложения; для вашего сервера — фактически ОБЯЗАТЕЛЬНО,
      ##   потому что здесь задаются режим, порт и секреты.
      ##
      ## В compose можно задавать:
      ## - строкой `KEY=value`
      ## - объектом `KEY: value` (как у вас)
      ## - либо подключать файлы через `env_file: ...` (альтернатива).
      NODE_ENV: production
      ## PORT — порт, на котором слушает Node.js приложение внутри контейнера.
      ## - Обязательность: зависит от кода; у вас также проброшен порт 4000:4000 ниже.
      PORT: "4000"
      ## DATABASE_URL_PROD — строка подключения к Supabase (prod).
      ## - Обязательность: ОБЯЗАТЕЛЬНО для сценария "БД только Supabase".
      ## - Значение берётся из переменной окружения хоста/compose `.env`:
      ##   `${POSTGRES_URL_PROD}`.
      ## - ВАЖНО: убедитесь, что ваш код реально читает `DATABASE_URL_PROD`
      ##   (иногда ожидают `DATABASE_URL`).
      DATABASE_URL_PROD: ${POSTGRES_URL_PROD}
      ## JWT_* — секреты для подписи/проверки токенов.
      ## - Обязательность: как правило ОБЯЗАТЕЛЬНО, иначе auth/refresh сломается.
      JWT_ACCESS: ${JWT_ACCESS}
      JWT_REFRESH: ${JWT_REFRESH}
      ## GigaChat_* — креды/скоуп для интеграции.
      ## - Обязательность: зависит от того, является ли интеграция обязательной для запуска.
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE}
    ports:
      ## ports — проброс портов наружу.
      ## Формат "HOST:CONTAINER".
      ## - Обязательность: ОПЦИОНАЛЬНО, если сервис нужен только другим контейнерам в сети compose.
      ## - Для доступа к API с хоста/браузера — обычно ОБЯЗАТЕЛЬНО.
      - "4000:4000"
    ## command — переопределяет CMD из Dockerfile.
    ## - Обязательность: ОПЦИОНАЛЬНО.
    ## - Зачем здесь:
    ##   - перед запуском сервера выполняются миграции Sequelize.
    ## - Риски:
    ##   - при множественных репликах сервера миграции могут стартовать параллельно.
    ##   - если миграции долгие/падают, контейнер будет рестартиться.
    ## - Альтернатива:
    ##   - вынести миграции в отдельный одноразовый сервис/job.
    command: ["sh", "-c", "npx sequelize-cli db:migrate && node ./src/app.js"]
    ## restart — политика рестартов.
    ## - Обязательность: ОПЦИОНАЛЬНО.
    ## - unless-stopped: перезапускать при падении, пока явно не остановите.
    restart: unless-stopped

  client:
    ## Аналогично server: собираем клиент из Dockerfile.
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        ## args — build-аргументы (ARG) для Dockerfile (влияют на сборку, а не на запуск).
        ## - Обязательность: ОПЦИОНАЛЬНО, но для Next.js `NEXT_PUBLIC_*` часто критично,
        ##   чтобы API URL "вшился" в клиентский бандл.
        # Важно: это значение "вшивается" в бандл (NEXT_PUBLIC_*).
        # Для локального запуска через Docker Compose браузер должен ходить по localhost:4000
        NEXT_PUBLIC_API_URL: "http://localhost:4000/api"
    container_name: project-client
    environment:
      ## environment — runtime переменные окружения контейнера клиента.
      ## - Для Next.js standalone они обычно менее важны, потому что `NEXT_PUBLIC_*` уже вшиты
      ##   на этапе build. Но `NODE_ENV/PORT` нужны для node-сервера, который раздаёт Next.
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      ## depends_on — порядок запуска (клиент стартует после server).
      ## - Обязательность: ОПЦИОНАЛЬНО.
      ## - Важно: это НЕ "ожидание готовности" (без healthcheck). Это просто порядок старта.
      - server
    ports:
      ## Проброс порта клиента наружу, чтобы открывать сайт в браузере.
      ## Формат "ВНЕШНИЙ/host (published) : ВНУТРЕННИЙ/container (target)".
      # - "80:3000"
      - "80:3000"
    restart: unless-stopped